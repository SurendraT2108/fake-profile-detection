<link rel="stylesheet" href="/static/style.css">

<div class="container">
    <h2>Fake Profile Detection</h2>
    
    <form action="/predict" method="POST">
        <input type="number" name="followers" placeholder="Followers">
        <input type="number" name="following" placeholder="Following">
        <input type="number" name="has_pic" placeholder="Has Profile Picture (1 or 0)">
        <input type="number" name="has_bio" placeholder="Has Bio (1 or 0)">
        <button type="submit">Predict</button>
    </form>

    {% if result %}
        <div class="result-box {% if 'REAL' in result %}result-success{% else %}result-fail{% endif %}">
            {{ result }}
        </div>
    {% endif %}
</div>
